apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mqtt-mirror.fullname" . }}
  labels:
    {{- include "mqtt-mirror.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if not .Values.mqtt.clean_session }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "mqtt-mirror.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mqtt-mirror.selectorLabels" . | nindent 8 }}
      {{- if or .Values.podAnnotations .Values.configFile }}
      annotations:
        {{- if .Values.configFile }}
        checksum/config: {{ .Values.configFile | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.configFile }}
          args: ["--config", "/etc/mqtt-mirror/mirror.toml"]
          {{- end }}
          env:
            - name: SOURCE
              valueFrom:
                secretKeyRef:
                  name: {{ include "mqtt-mirror.secretName" . }}
                  key: SOURCE
            - name: TARGET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mqtt-mirror.secretName" . }}
                  key: TARGET
            {{- if .Values.mqtt.topic_filter }}
            - name: TOPIC_FILTER
              value: "{{ include "mqtt-mirror.joinListWithComma" .Values.mqtt.topic_filter }}"
            {{- end }}
            {{- if .Values.verbose }}
            - name: VERBOSE
              value: "{{ .Values.verbose }}"
            {{- end }}
            {{- if .Values.name }}
            - name: NAME
              value: "{{ .Values.name }}"
            {{- end }}
            {{- if not .Values.mqtt.clean_session }}
            - name: CLEAN_SESSION
              value: "false"
            {{- end }}
            {{- if .Values.mqtt.topic_prefix }}
            - name: TOPIC_PREFIX
              value: "{{ .Values.mqtt.topic_prefix }}"
            {{- end }}
            {{- if .Values.mqtt.topic_replace }}
            - name: TOPIC_REPLACE
              value: "{{ include "mqtt-mirror.joinListWithComma" .Values.mqtt.topic_replace }}"
            {{- end }}
            {{- if .Values.mqtt.publish_timeout }}
            - name: PUBLISH_TIMEOUT
              value: "{{ .Values.mqtt.publish_timeout }}"
            {{- end }}
            {{- if .Values.mqtt.subscribe_qos }}
            - name: SUBSCRIBE_QOS
              value: {{ .Values.mqtt.subscribe_qos | quote }}
            {{- end }}
            - name: HEALTH_PORT
              value: "{{ .Values.health.port }}"
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- if .Values.configFile }}
          volumeMounts:
            - name: config
              mountPath: /etc/mqtt-mirror
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.configFile }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mqtt-mirror.fullname" . }}-config
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
