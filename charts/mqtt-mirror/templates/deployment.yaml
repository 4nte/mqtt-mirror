apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mqtt-mirror.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "mqtt-mirror.name" . }}
    helm.sh/chart: {{ include "mqtt-mirror.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mqtt-mirror.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mqtt-mirror.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: SOURCE
              valueFrom:
                secretKeyRef:
                  name: {{ include "mqtt-mirror.secretName" . }}
                  key: SOURCE
            - name: TARGET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mqtt-mirror.secretName" . }}
                  key: TARGET
            - name: TOPIC_FILTER
              value: "{{ include "mqtt-mirror.joinListWithComma" .Values.mqtt.topic_filter }}"
            {{- if .Values.verbose }}
            - name: VERBOSE
              value: "{{ .Values.verbose }}"
            {{- end }}
            {{- if .Values.name }}
            - name: NAME
              value: "{{ .Values.name }}"
            {{- end }}
            - name: HEALTH_PORT
              value: "{{ .Values.health.port }}"
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
