{{- if not .Values.mqtt.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mqtt-mirror.fullname" . }}
  labels:
    {{- include "mqtt-mirror.labels" . | nindent 4 }}
type: Opaque
data:
  SOURCE: {{ required ".Values.mqtt.source must be specified!" .Values.mqtt.source | b64enc | quote }}
  TARGET: {{ required ".Values.mqtt.target must be specified!" .Values.mqtt.target | b64enc | quote }}
{{- end }}
