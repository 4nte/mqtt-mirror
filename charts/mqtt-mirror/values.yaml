# Default values for mqtt-mirror.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: antegulin/mqtt-mirror
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

verbose: false
name: "" # name of the mqtt-mirror instance (used as clientID)

mqtt:
  source: ""
  target: ""
  topic_filter: [] # all topics
  clean_session: true # set to false for persistent sessions
  # Use an existing secret containing SOURCE and TARGET keys
  # existingSecret: ""

health:
  port: 8080

nameOverride: ""
fullnameOverride: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

podAnnotations: {}

extraEnvVars: []

serviceMonitor:
  enabled: false
  interval: 30s
  # labels: {}

nodeSelector: {}

tolerations: []

affinity: {}
