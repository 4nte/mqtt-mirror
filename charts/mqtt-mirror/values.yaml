# Default values for mqtt-mirror.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: antegulin/mqtt-mirror
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

verbose: false
name: "" # name of the mqtt-mirror instance (used as clientID)

mqtt:
  source: ""
  target: ""
  topic_filter: [] # all topics
  clean_session: true # set to false for persistent sessions
  topic_prefix: "" # prefix to prepend to all mirrored topics
  topic_replace: [] # topic replacements in old:new format
  publish_timeout: "" # timeout for publishing messages (e.g. "10s")
  subscribe_qos: 0  # QoS for source subscription (0, 1, or 2)
  # Use an existing secret containing SOURCE and TARGET keys
  # existingSecret: ""

health:
  port: 8080

nameOverride: ""
fullnameOverride: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

podAnnotations: {}

extraEnvVars: []

# Optional: inline TOML config file (mounted as ConfigMap at /etc/mqtt-mirror/mirror.toml)
# source and target are still read from the Secret; all other options can go here.
# configFile: |
#   verbose = true
#   topic_filter = ["devices/#", "sensors/+/temperature"]
#   name = "my-mirror"
#   health_port = 9090
#   clean_session = false
#   topic_prefix = "mirror/"
#   topic_replace = ["staging:production", "v1:v2"]
#   publish_timeout = "10s"

serviceMonitor:
  enabled: false
  interval: 30s
  # labels: {}

nodeSelector: {}

tolerations: []

affinity: {}
