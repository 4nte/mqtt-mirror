name: Release with goreleaser
on:
  push:
    branches:
    - "!*"
    tags:
    - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    name: goreleaser
    steps:
    - id: get_version
      uses: battila7/get-version-action@v2
    - run: echo ${{ steps.get_version.outputs.version-without-v }}
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"
      id: go

    - uses: actions/checkout@v4

    - name: Verify release notes exist
      run: |
        NOTES="changelog/${{ steps.get_version.outputs.version }}.md"
        if [ ! -f "$NOTES" ]; then
          echo "::error::Release notes not found: $NOTES"
          echo "Create $NOTES before tagging a release."
          exit 1
        fi

    - name: Docker Login
      if: success() && startsWith(github.ref, 'refs/tags/')
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        echo "${DOCKER_PASSWORD}" | docker login --username "${DOCKER_USERNAME}" --password-stdin

    - name: Login to GitHub Container Registry
      if: success() && startsWith(github.ref, 'refs/tags/')
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username ${{ github.actor }} --password-stdin

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: goreleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        version: "~> v2"
        args: release --release-notes=changelog/${{ steps.get_version.outputs.version }}.md
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        registry-url: "https://registry.npmjs.org"

    - name: Publish npm packages
      run: npm/publish.sh
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        VERSION: ${{ steps.get_version.outputs.version-without-v }}

    - name: Publish helm chart
      uses: stefanprodan/helm-gh-pages@v1.4.1
      with:
        token: ${{ secrets.PAT }}
        owner: 4nte
        repository: helm-charts
        branch: master
        chart_version: ${{ steps.get_version.outputs.version-without-v }}
        app_version: ${{ steps.get_version.outputs.version-without-v }}
